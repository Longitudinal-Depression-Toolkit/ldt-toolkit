name: Build Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'mkdocs.fast.yml'
      - 'requirements-dev.txt'
      - '.readthedocs.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'src/**/*.py'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'mkdocs.fast.yml'
      - 'requirements-dev.txt'
      - '.readthedocs.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'src/**/*.py'

jobs:
  build:
    if: >-
      ${{
        (github.event_name == 'push' && !contains(github.event.head_commit.message, '[no-build]')) ||
        (github.event_name == 'pull_request' &&
          !contains(github.event.pull_request.title, '[no-build]') &&
          !contains(github.event.pull_request.body || '', '[no-build]'))
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install UV
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv sync

      - name: Build documentation
        run: uv run mkdocs build --strict --site-dir site
